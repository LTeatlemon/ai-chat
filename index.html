<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天平台 - 多模型版 (PDF解析)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI聊天">
    <meta name="theme-color" content="#3b82f6">
    <!-- PDF.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-primary: #f8fafc; --bg-sidebar: #ffffff; --bg-sidebar-card: #f8fafc;
            --bg-chat: #f8fafc; --bg-input: #ffffff;
            --text-primary: #1e293b; --text-secondary: #64748b;
            --text-sidebar: #334155; --text-sidebar-muted: #94a3b8; --text-on-accent: #ffffff;
            --accent: #3b82f6; --accent-hover: #2563eb; --accent-light: #eff6ff;
            --accent-ring: rgba(59,130,246,0.25);
            --user-bubble: #3b82f6; --user-bubble-text: #ffffff;
            --ai-bubble: #ffffff; --ai-bubble-text: #1e293b; --ai-bubble-border: #e2e8f0;
            --border: #e2e8f0; --border-light: #f1f5f9; --sidebar-border: #e2e8f0;
            --radius-xs: 6px; --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px;
            --radius-xl: 24px; --radius-full: 9999px;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.12);
            --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
            --transition-slow: 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif; background:var(--bg-primary); height:100vh; display:flex; color:var(--text-primary); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:#94a3b8; }
        .sidebar { width:320px; min-width:320px; height:100vh; background:var(--bg-sidebar); display:flex; flex-direction:column; color:var(--text-sidebar); z-index:20; border-right:1px solid var(--sidebar-border); transition:transform var(--transition-slow); }
        .sidebar-header { padding:24px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
        .sidebar-header .logo-icon { width:38px; height:38px; border-radius:var(--radius-sm); background:linear-gradient(135deg,#3b82f6,#60a5fa); display:flex; align-items:center; justify-content:center; font-size:20px; }
        .sidebar-header .logo-text { font-weight:700; font-size:17px; color:var(--text-primary); }
        .sidebar-scroll { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:20px; }
        .sidebar-section { background:var(--bg-sidebar-card); border-radius:var(--radius-md); padding:18px 18px; border:1px solid var(--border-light); transition:box-shadow var(--transition); }
        .sidebar-section:hover { box-shadow:var(--shadow-xs); }
        .sidebar-section-title { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-sidebar-muted); margin-bottom:12px; font-weight:700; }
        .sidebar label { font-size:12px; color:var(--text-secondary); display:block; margin-bottom:6px; font-weight:500; }
        .sidebar input, .sidebar textarea { width:100%; padding:10px 12px; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:#ffffff; color:var(--text-primary); font-size:13px; resize:vertical; outline:none; font-family:inherit; transition:border-color var(--transition-fast), box-shadow var(--transition-fast); }
        .sidebar input:focus, .sidebar textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
        .sidebar textarea { min-height:70px; line-height:1.5; }
        .btn { padding:10px 16px; border-radius:var(--radius-sm); border:none; cursor:pointer; font-size:13px; font-weight:600; transition:all var(--transition-fast); display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; box-shadow:0 1px 2px rgba(59,130,246,0.3); } .btn-primary:hover { background:var(--accent-hover); box-shadow:0 4px 12px rgba(59,130,246,0.35); transform:translateY(-1px); } .btn-primary:active { transform:translateY(0); }
        .btn-outline { background:#ffffff; border:1.5px solid var(--border); color:var(--text-primary); } .btn-outline:hover { background:var(--bg-primary); border-color:#cbd5e1; }
        .agent-list { list-style:none; display:flex; flex-direction:column; gap:6px; }
        .agent-item { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:var(--radius-sm); cursor:pointer; border:1.5px solid transparent; background:var(--bg-sidebar); transition:all var(--transition-fast); }
        .agent-item:hover { background:var(--accent-light); border-color:var(--accent); transform:translateX(3px); }
        .agent-item.active { background:var(--accent-light); border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
        .agent-item .agent-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#3b82f6,#60a5fa); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; flex-shrink:0; }
        .main-content { flex:1; display:flex; flex-direction:column; height:100vh; background:var(--bg-chat); }
        .chat-toolbar { display:flex; align-items:center; gap:8px; padding:14px 24px; border-bottom:1px solid var(--border); background:#ffffff; flex-wrap:wrap; flex-shrink:0; }
        .chat-toolbar .toolbar-btn { padding:8px 16px; border-radius:var(--radius-full); border:1.5px solid var(--border); background:#ffffff; cursor:pointer; font-size:12px; font-weight:500; display:flex; align-items:center; gap:5px; color:var(--text-secondary); transition:all var(--transition-fast); }
        .chat-toolbar .toolbar-btn:hover { background:var(--bg-primary); border-color:#cbd5e1; color:var(--text-primary); }
        .chat-toolbar .toolbar-btn:disabled { opacity:0.4; cursor:not-allowed; }
        .toolbar-title { font-weight:700; font-size:15px; color:var(--text-primary); margin-right:auto; }
        .messages-container { flex:1; overflow-y:auto; padding:24px 20px; display:flex; flex-direction:column; align-items:center; gap:4px; background:var(--bg-chat); scroll-behavior:smooth; }
        .message { display:flex; gap:10px; max-width:720px; width:100%; animation:messageIn 0.35s cubic-bezier(0.16,1,0.3,1); }
        .message.user { justify-content:flex-end; }
        .message.assistant { justify-content:flex-start; }
        .msg-avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; margin-top:2px; }
        .message.user .msg-avatar { background:linear-gradient(135deg,#3b82f6,#60a5fa); color:#ffffff; order:2; }
        .message.assistant .msg-avatar { background:linear-gradient(135deg,#f1f5f9,#e2e8f0); color:var(--text-secondary); font-size:16px; }
        .msg-bubble { padding:14px 18px; border-radius:var(--radius-lg); line-height:1.65; font-size:14px; word-break:break-word; white-space:pre-wrap; }
        .message.user .msg-bubble { background:var(--user-bubble); color:var(--user-bubble-text); border-bottom-right-radius:6px; box-shadow:0 2px 8px rgba(59,130,246,0.25); }
        .message.assistant .msg-bubble { background:var(--ai-bubble); color:var(--ai-bubble-text); border:1px solid var(--ai-bubble-border); border-bottom-left-radius:6px; box-shadow:var(--shadow-sm); }
        .msg-bubble .cursor { display:inline-block; width:2px; height:16px; background:var(--accent); margin-left:2px; vertical-align:text-bottom; animation:blink 1s step-end infinite; }
        @keyframes messageIn { from { opacity:0; transform:translateY(12px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
        .input-area { padding:16px 24px 20px; border-top:1px solid var(--border); display:flex; gap:12px; align-items:flex-end; background:#ffffff; flex-shrink:0; }
        .input-area textarea { flex:1; padding:14px 18px; border-radius:var(--radius-lg); border:2px solid var(--border); resize:none; font-family:inherit; font-size:14px; line-height:1.5; outline:none; background:var(--bg-primary); transition:border-color var(--transition-fast), box-shadow var(--transition-fast); color:var(--text-primary); }
        .input-area textarea:focus { border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-ring); background:#ffffff; }
        .input-area textarea::placeholder { color:var(--text-sidebar-muted); }
        .send-btn { width:44px; height:44px; border-radius:50%; background:var(--accent); color:#fff; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all var(--transition-fast); box-shadow:0 2px 8px rgba(59,130,246,0.3); }
        .send-btn:hover:not(:disabled) { background:var(--accent-hover); box-shadow:0 4px 14px rgba(59,130,246,0.4); transform:scale(1.05); }
        .send-btn:active:not(:disabled) { transform:scale(0.95); }
        .send-btn:disabled { background:#cbd5e1; box-shadow:none; cursor:not-allowed; }
        .upload-btn { width:42px; height:42px; border-radius:50%; background:var(--bg-primary); border:2px solid var(--border); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all var(--transition-fast); color:var(--text-secondary); }
        .upload-btn:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
        #fileInput { display:none; }
        #hamburgerBtn { display:none; position:fixed; top:14px; left:14px; z-index:999; width:40px; height:40px; background:#ffffff; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:20px; box-shadow:var(--shadow-md); cursor:pointer; align-items:center; justify-content:center; transition:all var(--transition-fast); }
        #hamburgerBtn:hover { box-shadow:var(--shadow-lg); }
        @media (max-width: 768px) {
            .sidebar { position:fixed; top:0; left:0; transform:translateX(-100%); width:300px; min-width:300px; z-index:30; transition:transform var(--transition-slow); box-shadow:var(--shadow-xl); }
            .sidebar.open { transform:translateX(0); }
            #hamburgerBtn { display:flex; } .chat-toolbar { padding-left:64px; }
            .messages-container { padding:16px 12px; } .input-area { padding:10px 12px 16px; }
            .message { max-width:100%; }
        }
        .messages-empty { text-align:center; color:var(--text-sidebar-muted); margin-top:80px; font-size:15px; display:flex; flex-direction:column; align-items:center; gap:12px; }
        .messages-empty .empty-icon { font-size:48px; opacity:0.5; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s ease; }
        .modal { background:#fff; border-radius:var(--radius-lg); padding:28px; width:90%; max-width:480px; box-shadow:var(--shadow-xl); animation:modalIn 0.3s cubic-bezier(0.16,1,0.3,1); }
        .modal h3 { margin-bottom:20px; font-size:18px; font-weight:700; color:var(--text-primary); }
        .modal label { display:block; font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; margin-top:14px; }
        .modal input, .modal textarea { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:inherit; outline:none; transition:border-color var(--transition-fast), box-shadow var(--transition-fast); }
        .modal input:focus, .modal textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
        .toast-container { position:fixed; top:24px; right:24px; z-index:200; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
        .toast { padding:12px 20px; border-radius:var(--radius-md); color:#fff; font-size:13px; font-weight:500; pointer-events:auto; box-shadow:var(--shadow-lg); animation:toastIn 0.3s cubic-bezier(0.16,1,0.3,1), toastOut 0.3s cubic-bezier(0.4,0,0.2,1) 2.7s forwards; display:flex; align-items:center; gap:8px; max-width:380px; word-break:break-word; }
        .toast.success { background:#10b981; } .toast.error { background:#ef4444; } .toast.info { background:var(--accent); }
        @keyframes toastIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(40px); } }
        .import-btn { cursor:pointer; display:inline-flex; align-items:center; justify-content:center; background:var(--accent); color:#fff; padding:8px 14px; border-radius:var(--radius-sm); font-size:13px; text-align:center; font-weight:600; transition:all var(--transition-fast); }
        .import-btn:hover { background:var(--accent-hover); }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="logo-icon">🤖</div><span class="logo-text">AI 聊天平台</span></div>
        <div class="sidebar-scroll">
            <div class="sidebar-section">
                <div class="sidebar-section-title">DeepSeek API 设置</div>
                <label>DeepSeek API Key（文本对话）</label>
                <div style="position:relative;">
                    <input type="password" id="deepseekKeyInput" placeholder="sk-..." style="padding-right:36px;">
                    <button id="toggleDeepseekKeyVis" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-sidebar-muted); cursor:pointer; font-size:14px;">👁️</button>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">通义千问 API 设置</div>
                <label>千问 API Key（图片识别）</label>
                <div style="position:relative;">
                    <input type="password" id="qwenKeyInput" placeholder="sk-..." style="padding-right:36px;">
                    <button id="toggleQwenKeyVis" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-sidebar-muted); cursor:pointer; font-size:14px;">👁️</button>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">底层提示词（全局）</div>
                <textarea id="globalPromptInput" placeholder="例如：你是一个乐于助人的AI..."></textarea>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">我的智能体</div>
                <ul class="agent-list" id="agentList"></ul>
                <button class="btn btn-outline" id="createAgentBtn" style="margin-top:10px; width:100%;">➕ 创建新智能体</button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">数据管理</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-outline" id="exportBtn" style="flex:1;">⬇️ 导出</button>
                    <label for="importFileInput" class="import-btn" style="flex:1;">⬆️ 导入</label>
                    <input type="file" id="importFileInput" accept=".json" style="display:none;">
                </div>
            </div>
        </div>
    </aside>
    <div class="main-content">
        <div class="chat-toolbar">
            <span class="toolbar-title"><span id="currentAgentName">加载中...</span></span>
            <button class="toolbar-btn" id="regenerateBtn">🔄 重新生成</button>
            <button class="toolbar-btn" id="undoBtn">↩️ 撤回</button>
            <button class="toolbar-btn" id="restartChatBtn">🗑️ 重启</button>
        </div>
        <div class="messages-container" id="messagesContainer"><div class="messages-empty"><div class="empty-icon">💬</div><div>选择智能体开始聊天</div></div></div>
        <div class="input-area">
            <button class="upload-btn" id="uploadBtn" title="上传文件或图片">📎</button>
            <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.pdf,.png,.jpg,.jpeg,.gif,.webp" multiple>
            <textarea id="messageInput" placeholder="输入消息... (Enter发送)" rows="1" disabled></textarea>
            <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>
    </div>
    <div class="modal-overlay" id="agentModalOverlay" style="display:none;">
        <div class="modal">
            <h3 id="agentModalTitle">创建智能体</h3>
            <label>名称</label><input type="text" id="agentNameInput" placeholder="智能体名称">
            <label style="margin-top:12px;">表层提示词（人设）</label>
            <textarea id="agentPromptInput" rows="4" placeholder="描述智能体的性格..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelAgentBtn">取消</button>
                <button class="btn btn-primary" id="saveAgentBtn">保存</button>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // 配置 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        (function() {
            // ==================== IndexedDB 封装 ====================
            const DB_NAME = 'AiChatDB', STORE = 'state';
            function openDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, 1);
                    req.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains(STORE)) e.target.result.createObjectStore(STORE); };
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
            }
            async function dbSet(key, val) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readwrite');
                    tx.objectStore(STORE).put(val, key);
                    tx.oncomplete = resolve;
                    tx.onerror = () => reject(tx.error);
                });
            }
            async function dbGet(key) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readonly');
                    const req = tx.objectStore(STORE).get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }

            // ==================== 全局状态 ====================
            const state = {
                deepseekKey: '',
                qwenKey: '',
                globalPrompt: '',
                agents: [],
                currentAgentId: null,
                conversations: {},
                isStreaming: false,
                editingAgentId: null,
                abortController: null,
            };
            let pendingFiles = [];

            const $ = id => document.getElementById(id);
            function toast(msg, type='info') {
                const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
                $('toastContainer').appendChild(t); setTimeout(() => t.remove(), 3000);
            }

            async function saveAll() {
                await Promise.all([
                    dbSet('deepseekKey', state.deepseekKey), dbSet('qwenKey', state.qwenKey),
                    dbSet('globalPrompt', state.globalPrompt), dbSet('agents', state.agents),
                    dbSet('currentAgentId', state.currentAgentId), dbSet('conversations', state.conversations),
                ]).catch(e => toast('保存失败', 'error'));
            }

            async function loadAll() {
                const [deepseekKey, qwenKey, globalPrompt, agents, currentAgentId, conversations] = await Promise.all([
                    dbGet('deepseekKey'), dbGet('qwenKey'), dbGet('globalPrompt'), dbGet('agents'), dbGet('currentAgentId'), dbGet('conversations')
                ]);
                state.deepseekKey = deepseekKey || ''; state.qwenKey = qwenKey || '';
                state.globalPrompt = globalPrompt || ''; state.agents = agents || [];
                state.currentAgentId = currentAgentId || null; state.conversations = conversations || {};
                if (!state.agents.length) {
                    const def = { id: 'agent_'+Date.now(), name: '通用助手', surfacePrompt: '你是一个乐于助人的AI。', createdAt: new Date().toISOString() };
                    state.agents = [def]; state.currentAgentId = def.id; state.conversations[def.id] = [];
                    await saveAll();
                }
                if (state.currentAgentId && !state.agents.find(a => a.id === state.currentAgentId)) state.currentAgentId = state.agents[0]?.id || null;
                if (!state.currentAgentId && state.agents.length) state.currentAgentId = state.agents[0].id;
                state.agents.forEach(a => { if (!state.conversations[a.id]) state.conversations[a.id] = []; });
            }

            function getAgent() { return state.agents.find(a => a.id === state.currentAgentId); }
            function getMsgs() { return state.currentAgentId ? (state.conversations[state.currentAgentId] || []) : []; }
            function setMsgs(msgs) { if (!state.currentAgentId) return; state.conversations[state.currentAgentId] = msgs; saveAll(); }

            function updateUI() {
                $('deepseekKeyInput').value = state.deepseekKey; $('qwenKeyInput').value = state.qwenKey;
                $('globalPromptInput').value = state.globalPrompt;
                const agent = getAgent(); $('currentAgentName').textContent = agent ? agent.name : '未选择';
                renderAgentList(); renderMessages();
                const can = !!(state.deepseekKey && state.currentAgentId && !state.isStreaming);
                $('messageInput').disabled = !can; $('sendBtn').disabled = !can;
                $('regenerateBtn').disabled = !can || getMsgs().length === 0;
                $('undoBtn').disabled = !can || getMsgs().length === 0;
                $('restartChatBtn').disabled = getMsgs().length === 0;
            }

            function renderAgentList() {
                const list = $('agentList'); list.innerHTML = '';
                state.agents.forEach(a => {
                    const li = document.createElement('li');
                    li.className = 'agent-item' + (a.id === state.currentAgentId ? ' active' : '');
                    li.innerHTML = `<div class="agent-avatar">${a.name.charAt(0)}</div><div style="flex:1"><b>${a.name}</b><br><small>${(a.surfacePrompt||'').slice(0,20)}</small></div>`;
                    li.onclick = (e) => {
                        if (e.target.closest('button')) return;
                        if (state.isStreaming) return toast('请等待', 'info');
                        state.currentAgentId = a.id; saveAll().then(updateUI);
                        if (window.innerWidth <= 768) $('sidebar').classList.remove('open');
                    };
                    const delBtn = document.createElement('button'); delBtn.textContent = '🗑️'; delBtn.style.cssText = 'background:none;border:none;cursor:pointer;margin-left:auto;';
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteAgent(a.id); };
                    li.appendChild(delBtn); list.appendChild(li);
                });
            }

            function deleteAgent(id) {
                if (state.agents.length <= 1) return toast('至少保留一个智能体', 'error');
                if (!confirm('确定删除？')) return;
                state.agents = state.agents.filter(a => a.id !== id);
                delete state.conversations[id];
                if (state.currentAgentId === id) state.currentAgentId = state.agents[0]?.id;
                saveAll().then(updateUI);
            }

            function renderMessages() {
                const container = $('messagesContainer');
                const msgs = getMsgs();
                const agent = getAgent();
                const userInitial = agent ? agent.name.charAt(0) : '👤';
                container.innerHTML = msgs.length ? '' : '<div class="messages-empty"><div class="empty-icon">💬</div><div>开始对话吧</div></div>';
                msgs.forEach(m => {
                    const div = document.createElement('div'); div.className = `message ${m.role}`;
                    const avatar = m.role === 'user'
                        ? `<div class="msg-avatar">${userInitial}</div>`
                        : '<div class="msg-avatar">🤖</div>';
                    div.innerHTML = `${avatar}<div class="msg-bubble">${escapeHtml(m.content)}</div>`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            }

            function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

            // 摘要记忆
            async function summarizeOldMessages(messages, keepRecent = 6) {
                if (messages.length <= keepRecent) return messages;
                const oldMessages = messages.slice(0, messages.length - keepRecent);
                const recentMessages = messages.slice(messages.length - keepRecent);
                const oldText = oldMessages.map(m => `${m.role}: ${m.content}`).join('\n');
                try {
                    const resp = await fetch('https://api.deepseek.com/chat/completions', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.deepseekKey}` },
                        body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: '压缩以下对话为摘要，不保留时间信息。' }, { role: 'user', content: oldText }], stream: false, temperature: 0.3, max_tokens: 500 })
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        const summary = data.choices[0].message.content.trim();
                        return [{ role: 'system', content: `[对话摘要] ${summary}` }, ...recentMessages];
                    }
                } catch(e) {}
                return recentMessages;
            }

            function exportData() {
                const data = { deepseekKey: state.deepseekKey, qwenKey: state.qwenKey, globalPrompt: state.globalPrompt, agents: state.agents, currentAgentId: state.currentAgentId, conversations: state.conversations, exportedAt: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `ai_chat_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
                URL.revokeObjectURL(url); toast('已导出', 'success');
            }

            function importData(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data.agents || !data.conversations) throw new Error('无效文件');
                        if (!confirm('导入将覆盖当前数据，继续吗？')) return;
                        state.deepseekKey = data.deepseekKey || ''; state.qwenKey = data.qwenKey || '';
                        state.globalPrompt = data.globalPrompt || ''; state.agents = data.agents;
                        state.conversations = data.conversations; state.currentAgentId = data.currentAgentId || (data.agents[0]?.id || null);
                        state.agents.forEach(a => { if (!state.conversations[a.id]) state.conversations[a.id] = []; });
                        await saveAll(); updateUI(); toast('导入成功', 'success');
                    } catch (err) { toast('导入失败', 'error'); }
                };
                reader.readAsText(file);
            }

            function compressImage(file, maxSize = 800, quality = 0.7) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            let width = img.width, height = img.height;
                            if (width > maxSize || height > maxSize) {
                                if (width > height) { height = (height / width) * maxSize; width = maxSize; }
                                else { width = (width / height) * maxSize; height = maxSize; }
                            }
                            const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', quality));
                        };
                        img.onerror = reject; img.src = e.target.result;
                    };
                    reader.onerror = reject; reader.readAsDataURL(file);
                });
            }

            // 提取 PDF 文本
            async function extractPdfText(file) {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }
                return fullText.slice(0, 10000); // 限制字符数
            }

            // ==================== 核心发送逻辑 ====================
            async function sendMessage() {
                if (state.isStreaming || !state.deepseekKey || !state.currentAgentId) return;
                const input = $('messageInput');
                const content = input.value.trim();
                if (!content && !pendingFiles.length) return;

                const imagesForVision = pendingFiles.filter(f => f.type === 'image' && f.dataUrl).map(f => ({ dataUrl: f.dataUrl }));

                let finalContent = content;
                if (pendingFiles.length > 0) {
                    const fileParts = [];
                    for (const f of pendingFiles) {
                        if (f.type === 'image') fileParts.push(`[图片: ${f.name}]`);
                        else if (f.type === 'pdf') fileParts.push(`[PDF文件 ${f.name} 内容开始]\n${f.content}\n[PDF文件 ${f.name} 内容结束]`);
                        else fileParts.push(`[文件 ${f.name}]\n${f.content}`);
                    }
                    finalContent = `${content}\n\n${fileParts.join('\n\n')}`;
                    pendingFiles = [];
                }

                const msgs = getMsgs();
                msgs.push({ role: 'user', content: finalContent });
                setMsgs(msgs);
                input.value = ''; input.style.height = 'auto'; updateUI();

                state.isStreaming = true; state.abortController = new AbortController(); updateUI();

                const now = new Date();
                const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
                const timeHint = `现在的时间是${timeStr}，日期是${dateStr}（北京时间）。你必须以这个时间为准，忽略对话历史中任何与此矛盾的时间表述，历史中的时间信息可能是错误的。当用户询问时间时，用符合你人设的语气自然回答。不要刻意加戏也不要刻意回避。`;

                let processedMsgs = msgs;
                if (msgs.length > 10) processedMsgs = await summarizeOldMessages(msgs, 6);

                const system = [timeHint, state.globalPrompt, getAgent()?.surfacePrompt || ''].filter(Boolean).join('\n\n');
                const hasImage = imagesForVision.length > 0 && state.qwenKey.trim() !== '';
                let apiMsgs, modelName, apiKey, apiUrl;

                if (hasImage) {
                    const userContent = [];
                    if (content) userContent.push({ type: 'text', text: content });
                    for (const img of imagesForVision) {
                        userContent.push({ type: 'image_url', image_url: { url: img.dataUrl } });
                    }
                    apiMsgs = [{ role: 'system', content: system || '你是一个有帮助的AI。' }, { role: 'user', content: userContent }];
                    modelName = 'qwen-vl-plus';
                    apiKey = state.qwenKey;
                    apiUrl = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
                } else {
                    apiMsgs = [{ role: 'system', content: system || '你是一个有帮助的AI。' }, ...processedMsgs.map(m => ({ role: m.role, content: m.content }))];
                    modelName = 'deepseek-chat';
                    apiKey = state.deepseekKey;
                    apiUrl = 'https://api.deepseek.com/chat/completions';
                }

                const container = $('messagesContainer');
                const streamDiv = document.createElement('div'); streamDiv.className = 'message assistant';
                streamDiv.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><span class="stream-content"></span><span class="cursor"></span></div>';
                container.appendChild(streamDiv); container.scrollTop = container.scrollHeight;

                try {
                    const resp = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model: modelName, messages: apiMsgs, stream: true }),
                        signal: state.abortController.signal,
                    });
                    if (!resp.ok) {
                        const errText = await resp.text();
                        console.error('API错误:', errText);
                        if (hasImage) throw new Error('图片识别请求失败，请检查千问API Key是否正确');
                        throw new Error(`请求失败 (${resp.status})`);
                    }
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let full = '', buffer = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n'); buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (!line.trim() || !line.startsWith('data:')) continue;
                            const data = line.slice(5).trim();
                            if (data === '[DONE]') continue;
                            try {
                                const j = JSON.parse(data);
                                full += j.choices?.[0]?.delta?.content || '';
                                streamDiv.querySelector('.stream-content').textContent = full;
                                container.scrollTop = container.scrollHeight;
                            } catch(e) {}
                        }
                    }
                    streamDiv.querySelector('.cursor').remove();
                    streamDiv.querySelector('.msg-bubble').textContent = full;
                    const updated = getMsgs(); updated.push({ role: 'assistant', content: full }); setMsgs(updated);
                } catch (e) {
                    streamDiv.remove();
                    if (e.name !== 'AbortError') toast('错误: ' + e.message, 'error');
                } finally {
                    state.isStreaming = false; state.abortController = null; updateUI();
                }
            }

            async function regenerate() {
                if (state.isStreaming) return;
                const msgs = getMsgs();
                if (msgs.length && msgs[msgs.length-1].role === 'assistant') msgs.pop();
                if (!msgs.length || msgs[msgs.length-1].role !== 'user') return;
                setMsgs(msgs); updateUI();

                const now = new Date();
                const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
                const timeHint = `现在的时间是${timeStr}，日期是${dateStr}（北京时间）。当用户询问时间相关问题时，用符合你人设的语气自然回答。`;

                let processedMsgs = msgs;
                if (msgs.length > 10) processedMsgs = await summarizeOldMessages(msgs, 6);
                const system = [timeHint, state.globalPrompt, getAgent()?.surfacePrompt || ''].filter(Boolean).join('\n\n');
                const apiMsgs = [{ role: 'system', content: system || '你是一个有帮助的AI。' }, ...processedMsgs.map(m => ({ role: m.role, content: m.content }))];

                state.isStreaming = true; state.abortController = new AbortController(); updateUI();
                const container = $('messagesContainer');
                const streamDiv = document.createElement('div'); streamDiv.className = 'message assistant';
                streamDiv.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><span class="stream-content"></span><span class="cursor"></span></div>';
                container.appendChild(streamDiv);
                try {
                    const resp = await fetch('https://api.deepseek.com/chat/completions', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.deepseekKey}` },
                        body: JSON.stringify({ model: 'deepseek-chat', messages: apiMsgs, stream: true }),
                        signal: state.abortController.signal,
                    });
                    if (!resp.ok) throw new Error(`请求失败 (${resp.status})`);
                    const reader = resp.body.getReader(); const decoder = new TextDecoder();
                    let full = '', buffer = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n'); buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (!line.trim() || !line.startsWith('data:')) continue;
                            const data = line.slice(5).trim(); if (data === '[DONE]') continue;
                            try { const j = JSON.parse(data); full += j.choices?.[0]?.delta?.content || ''; streamDiv.querySelector('.stream-content').textContent = full; container.scrollTop = container.scrollHeight; } catch(e) {}
                        }
                    }
                    streamDiv.querySelector('.cursor').remove(); streamDiv.querySelector('.msg-bubble').textContent = full;
                    const updated = getMsgs(); updated.push({ role: 'assistant', content: full }); setMsgs(updated);
                } catch (e) { streamDiv.remove(); if (e.name !== 'AbortError') toast('错误: ' + e.message, 'error'); }
                finally { state.isStreaming = false; state.abortController = null; updateUI(); }
            }

            function undo() {
                if (state.isStreaming) { state.abortController?.abort(); return; }
                const msgs = getMsgs(); if (!msgs.length) return;
                const removed = msgs.pop(); setMsgs(msgs); updateUI();
                toast(`已撤回一条${removed.role === 'user' ? '用户' : 'AI'}消息`, 'info');
            }

            function restartChat() {
                if (state.isStreaming) { state.abortController?.abort(); setTimeout(restartChat, 200); return; }
                if (!getMsgs().length) return toast('对话已空', 'info');
                if (confirm('清空当前对话？')) { setMsgs([]); updateUI(); toast('已重启', 'success'); }
            }

            // 文件上传处理（包含PDF）
            $('uploadBtn').onclick = () => $('fileInput').click();
            $('fileInput').onchange = async (e) => {
                const files = Array.from(e.target.files); if (!files.length) return;
                pendingFiles = []; $('messageInput').value = '';
                for (const file of files) {
                    if (file.type.startsWith('image/')) {
                        const compressed = await compressImage(file, 1200, 0.85);
                        pendingFiles.push({ type: 'image', name: file.name, size: file.size, dataUrl: compressed, file: file });
                    } else if (file.type === 'application/pdf') {
                        try {
                            const text = await extractPdfText(file);
                            pendingFiles.push({ type: 'pdf', name: file.name, content: text });
                        } catch (err) {
                            toast(`PDF解析失败: ${file.name}`, 'error');
                        }
                    } else {
                        const text = await file.text();
                        pendingFiles.push({ type: 'file', name: file.name, content: text.slice(0, 10000) });
                    }
                }
                const fileList = pendingFiles.map(f => {
                    if (f.type === 'image') return `[图片: ${f.name}]`;
                    else if (f.type === 'pdf') return `[PDF: ${f.name}]`;
                    else return `[文件: ${f.name}]`;
                }).join(', ');
                $('messageInput').value = `发送：${fileList}\n(可输入文字说明)`; $('messageInput').focus();
            };

            // 事件绑定
            $('sendBtn').onclick = sendMessage;
            $('messageInput').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
            $('messageInput').oninput = () => { $('messageInput').style.height = 'auto'; $('messageInput').style.height = Math.min($('messageInput').scrollHeight, 140) + 'px'; };
            $('regenerateBtn').onclick = regenerate;
            $('undoBtn').onclick = undo;
            $('restartChatBtn').onclick = restartChat;
            $('deepseekKeyInput').oninput = e => { state.deepseekKey = e.target.value; saveAll(); updateUI(); };
            $('qwenKeyInput').oninput = e => { state.qwenKey = e.target.value; saveAll(); updateUI(); };
            $('toggleDeepseekKeyVis').onclick = () => { const el = $('deepseekKeyInput'); el.type = el.type === 'password' ? 'text' : 'password'; };
            $('toggleQwenKeyVis').onclick = () => { const el = $('qwenKeyInput'); el.type = el.type === 'password' ? 'text' : 'password'; };
            $('createAgentBtn').onclick = () => {
                state.editingAgentId = null; $('agentNameInput').value = ''; $('agentPromptInput').value = '';
                $('agentModalTitle').textContent = '创建智能体'; $('agentModalOverlay').style.display = 'flex';
            };
            $('cancelAgentBtn').onclick = () => $('agentModalOverlay').style.display = 'none';
            $('saveAgentBtn').onclick = async () => {
                const name = $('agentNameInput').value.trim(), prompt = $('agentPromptInput').value.trim();
                if (!name) return toast('请输入名称', 'error');
                if (state.editingAgentId) {
                    const agent = state.agents.find(a => a.id === state.editingAgentId);
                    if (agent) { agent.name = name; agent.surfacePrompt = prompt; }
                } else {
                    const newAgent = { id: 'agent_'+Date.now(), name, surfacePrompt: prompt, createdAt: new Date().toISOString() };
                    state.agents.push(newAgent); state.conversations[newAgent.id] = []; state.currentAgentId = newAgent.id;
                }
                await saveAll(); $('agentModalOverlay').style.display = 'none'; updateUI();
                toast(state.editingAgentId ? '已更新' : '已创建', 'success'); state.editingAgentId = null;
            };
            $('agentModalOverlay').onclick = e => { if (e.target === $('agentModalOverlay')) $('agentModalOverlay').style.display = 'none'; };
            $('exportBtn').onclick = exportData;
            $('importFileInput').onchange = e => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; };
            $('hamburgerBtn').onclick = () => $('sidebar').classList.toggle('open');
            document.querySelector('.main-content').addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && $('sidebar').classList.contains('open') && !e.target.closest('#hamburgerBtn') && !e.target.closest('.sidebar')) {
                    $('sidebar').classList.remove('open');
                }
            });
            if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));

            // 初始化
            (async () => { await loadAll(); updateUI(); if (state.deepseekKey && state.currentAgentId) $('messageInput').focus(); })();
        })();
    </script>
</body>
</html>
